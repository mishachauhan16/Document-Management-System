<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DMS — Set New Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .wrap{width:100%;max-width:440px;padding:24px;}
  .logo{text-align:center;margin-bottom:28px;}
  .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#d97706,#b45309);border-radius:14px;
    display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;}
  .logo h2{color:#f1f5f9;font-size:22px;font-weight:700;}
  .logo p{color:#94a3b8;font-size:13px;margin-top:4px;}
  .card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px;}
  label{color:#94a3b8;font-size:12px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
  .form-control{background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:12px 16px;font-size:14px;transition:border-color .2s;}
  .form-control:focus{background:#0f172a;border-color:#d97706;color:#f1f5f9;box-shadow:0 0 0 3px #d9770622;outline:none;}
  .form-control::placeholder{color:#475569;}
  .strength-bar{height:4px;background:#0f172a;border-radius:4px;margin-top:8px;overflow:hidden;}
  .strength-fill{height:100%;width:0%;border-radius:4px;transition:width .3s,background .3s;}
  .strength-label{font-size:11px;color:#64748b;margin-top:4px;}
  .rule{font-size:12px;color:#475569;display:flex;align-items:center;gap:6px;margin-top:4px;}
  .rule.ok{color:#4ade80;}
  .rule.ok::before{content:'✓';}
  .rule:not(.ok)::before{content:'○';}
  .btn-change{background:linear-gradient(135deg,#d97706,#b45309);border:none;color:#fff;width:100%;
    padding:13px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px;}
  .btn-change:hover{background:linear-gradient(135deg,#f59e0b,#d97706);transform:translateY(-1px);}
  .btn-change:disabled{opacity:.6;cursor:not-allowed;transform:none;}
  .alert-box{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:12px;font-size:13px;margin-bottom:16px;display:none;}
  .success-box{background:#052e16;border:1px solid #166534;color:#86efac;border-radius:8px;padding:12px;font-size:13px;margin-bottom:16px;display:none;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <h2>Set Your Password</h2>
    <p>You must set a new password before continuing</p>
  </div>

  <div class="card">
    <div class="alert-box" id="alertBox"></div>
    <div class="success-box" id="successBox"></div>

    <div class="mb-4">
      <label>Current Password</label>
      <input type="password" id="current" class="form-control" placeholder="Enter current / default password"/>
    </div>

    <div class="mb-3">
      <label>New Password</label>
      <input type="password" id="newPass" class="form-control" placeholder="Choose a strong password" oninput="checkStrength()"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel">Enter a password</div>
    </div>

    <div class="mb-2">
      <div class="rule" id="r-len">At least 6 characters</div>
      <div class="rule" id="r-upper">One uppercase letter</div>
      <div class="rule" id="r-num">One number</div>
    </div>

    <div class="mb-4">
      <label>Confirm New Password</label>
      <input type="password" id="confirm" class="form-control" placeholder="Repeat new password"/>
    </div>

    <button class="btn-change" id="changeBtn" onclick="doChange()">Set New Password</button>
  </div>
</div>

<script src="/dms/frontend/assets/app.js"></script>
<script>
  // Allow access without checking must_change_password (this IS the change page)
  if (!Auth.isLoggedIn()) { window.location.href = '/dms/frontend/login.html'; }

  function checkStrength() {
    const v = document.getElementById('newPass').value;
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    const r = { len: v.length >= 6, upper: /[A-Z]/.test(v), num: /[0-9]/.test(v) };
    document.getElementById('r-len').className   = 'rule' + (r.len   ? ' ok' : '');
    document.getElementById('r-upper').className = 'rule' + (r.upper ? ' ok' : '');
    document.getElementById('r-num').className   = 'rule' + (r.num   ? ' ok' : '');
    const score = [r.len, r.upper, r.num, v.length >= 10, /[^a-zA-Z0-9]/.test(v)].filter(Boolean).length;
    const cfg = [[0,'0%','#1e293b',''], [1,'20%','#ef4444','Weak'], [2,'40%','#f97316','Fair'],
                 [3,'65%','#eab308','Good'], [4,'80%','#22c55e','Strong'], [5,'100%','#4ade80','Very Strong']];
    const [,w,c,l] = cfg[score] || cfg[0];
    fill.style.width = w; fill.style.background = c; label.textContent = l;
    label.style.color = c;
  }

  async function doChange() {
    const current = document.getElementById('current').value;
    const newPass  = document.getElementById('newPass').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('changeBtn');

    hideAlerts();

    if (!current || !newPass || !confirm)        { showErr('All fields are required.'); return; }
    if (newPass.length < 6)                      { showErr('Password must be at least 6 characters.'); return; }
    if (newPass !== confirm)                     { showErr('Passwords do not match.'); return; }

    btn.disabled = true; btn.textContent = 'Saving...';

    try {
      const data = await api('/auth/change-password', 'POST', {
        current_password: current, new_password: newPass, confirm_password: confirm
      });

      if (data.success) {
        document.getElementById('successBox').textContent = 'Password changed! Redirecting...';
        document.getElementById('successBox').style.display = 'block';
        // Update must_change_password in stored user
        const u = Auth.user();
        u.must_change_password = false;
        localStorage.setItem('dms_user', JSON.stringify(u));
        setTimeout(() => {
          window.location.href = u.role === 'admin' ? '/dms/frontend/admin.html' : '/dms/frontend/dashboard.html';
        }, 1500);
      } else {
        showErr(data.message || 'Failed to change password.');
      }
    } catch { showErr('Server error. Please try again.'); }
    finally { btn.disabled = false; btn.textContent = 'Set New Password'; }
  }

  function showErr(m) { const b=document.getElementById('alertBox'); b.textContent=m; b.style.display='block'; }
  function hideAlerts() { document.getElementById('alertBox').style.display='none'; document.getElementById('successBox').style.display='none'; }
</script>
</body>
</html>
